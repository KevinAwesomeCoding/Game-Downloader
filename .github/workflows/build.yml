name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'README.md'
      - 'version_info.txt'
      - '.github/workflows/**'
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    # Only build and publish a release exe when triggered by a tag push.
    # Running on plain branch pushes would stamp the wrong VERSION and
    # upload an exe to a release that doesn't exist yet.
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Bundle 7-Zip binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bin | Out-Null
          Copy-Item "C:\Program Files\7-Zip\7z.exe" bin\
          Copy-Item "C:\Program Files\7-Zip\7z.dll" bin\

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          # On a tag push github.ref_name IS the pushed tag (e.g. "v1.2.0").
          # We never fabricate a tag here; the job-level `if` above already
          # ensures we only reach this step when github.ref_type == "tag".
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Inject VERSION into main.py
        shell: pwsh
        run: |
          # Stamp the exe with the exact git tag that triggered this run so
          # the running app's VERSION always matches the release tag_name and
          # the self-update check won't loop or show a stale version.
          $tag = "${{ steps.tag.outputs.tag }}"
          (Get-Content main.py) -replace '^VERSION = ".*"$', "VERSION = `"$tag`"" |
            Set-Content main.py -Encoding UTF8

      - name: Verify VERSION stamp
        shell: pwsh
        run: |
          # Print the stamped line so it is visible in the Actions log.
          # If the pattern is missing the inject step silently failed — catch it here.
          $line = (Get-Content main.py) | Select-String '^VERSION = '
          if (-not $line) {
            Write-Error "VERSION line not found in main.py after inject step!"
            exit 1
          }
          Write-Host "Stamped: $line"

      - name: Build onedir (CrossOver / Wine)
        run: >
          pyinstaller
          --onedir
          --windowed
          --uac-admin
          --noupx
          --version-file version_info.txt
          --collect-all PyQt6
          --hidden-import PyQt6.sip
          --contents-directory .
          --add-data "bin/7z.exe;bin"
          --add-data "bin/7z.dll;bin"
          --name "GameInstaller"
          main.py

      # NOTE: No DLL-flattening step on purpose. PyInstaller's PyQt6 layout and
      # its generated qt.conf must stay intact — especially
      # PyQt6/Qt6/plugins/platforms/qwindows.dll. Flattening breaks Qt's plugin
      # discovery and never fixed the real Wine failure, which is the bottle's
      # Universal CRT (ucrtbase) being too old for the bundled MSVC 14.44
      # runtime that Qt 6.x links against. Fix that in the bottle (recent
      # CrossOver / matching VC++ redist), not by moving DLLs around.

      - name: Zip onedir build
        shell: pwsh
        run: Compress-Archive -Path dist\GameInstaller -DestinationPath dist\GameInstaller.zip

      - name: Build onefile (Windows)
        run: >
          pyinstaller
          --onefile
          --windowed
          --uac-admin
          --noupx
          --version-file version_info.txt
          --collect-all PyQt6
          --hidden-import PyQt6.sip
          --add-data "bin/7z.exe;bin"
          --add-data "bin/7z.dll;bin"
          --name "GameInstaller"
          main.py

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Game Installer ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            dist/GameInstaller.zip
            dist/GameInstaller.exe
          body: |
            **Version:** ${{ steps.tag.outputs.version }}
            **Commit:** `${{ github.sha }}`
            **Trigger:** ${{ github.event_name }}

            ### Windows users (recommended)
            Download **`GameInstaller.zip`**, extract it, and run `GameInstaller\GameInstaller.exe` from inside the folder.
            This folder build is the least likely to trip antivirus false positives.

            Prefer one file? **`GameInstaller.exe`** works too. Because it is unsigned and
            self-extracting, Windows Defender may show a false-positive warning. If it does:
            click **More info → Run anyway**, or allow it in Windows Security →
            Virus & threat protection → Protection history.

            ### CrossOver / Wine users (Mac)
            Download **`GameInstaller.zip`**, extract it, then run `GameInstaller\GameInstaller.exe` from inside the extracted folder.
            Requires CrossOver 24+ (Wine 9+) for the bundled Qt runtime to load correctly.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}