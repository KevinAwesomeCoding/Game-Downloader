name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          $date    = Get-Date -Format "yyyyMMdd"
          $run     = "${{ github.run_number }}"
          $tag     = "v$version-$date-$run"
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows executable
        run: >
          pyinstaller
          --onedir
          --windowed
          --uac-admin
          --collect-all PyQt6
          --collect-binaries PyQt6
          --hidden-import PyQt6.sip
          --contents-directory .
          --name "GameInstaller"
          main.py

      - name: Flatten DLLs for Wine/CrossOver compatibility
        shell: pwsh
        run: |
          $dest = "dist\GameInstaller"

          # Phase 1 — copy every DLL to the exe root so the PE loader finds
          # python311.dll and vcruntime140.dll when the exe starts.
          Get-ChildItem $dest -Directory | ForEach-Object {
            Get-ChildItem $_.FullName -Recurse -Filter *.dll | ForEach-Object {
              Copy-Item $_.FullName -Destination $dest -Force
            }
          }
          $rootDlls = (Get-ChildItem $dest -Filter *.dll).Count
          Write-Host "Phase 1: $rootDlls DLLs now in exe directory"

          # Phase 2 — mirror every DLL next to QtCore.pyd.
          # Wine's LoadLibrary() resolves imports from the calling module's
          # directory, not the exe root, so Qt6Core.dll must live in PyQt6/.
          $qtPyd = Get-ChildItem $dest -Recurse -Filter QtCore.pyd | Select-Object -First 1
          if (-not $qtPyd) { Write-Error "QtCore.pyd not found"; exit 1 }
          $pyqt6 = $qtPyd.DirectoryName
          Write-Host "PyQt6 dir: $pyqt6"
          Get-ChildItem $dest -Filter *.dll | ForEach-Object {
            Copy-Item $_.FullName -Destination $pyqt6 -Force
          }
          $pyqtDlls = (Get-ChildItem $pyqt6 -Filter *.dll).Count
          Write-Host "Phase 2: $pyqtDlls DLLs now next to QtCore.pyd"

          if (Test-Path (Join-Path $pyqt6 "Qt6Core.dll")) {
            Write-Host "OK: Qt6Core.dll is next to QtCore.pyd"
          } else {
            Write-Error "FAIL: Qt6Core.dll not found next to QtCore.pyd"
            exit 1
          }

      - name: Zip dist folder
        shell: pwsh
        run: Compress-Archive -Path dist\GameInstaller -DestinationPath dist\GameInstaller.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Game Installer ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: dist/GameInstaller.zip
          body: |
            **Version:** ${{ steps.tag.outputs.version }}
            **Commit:** `${{ github.sha }}`
            **Trigger:** ${{ github.event_name }}

            ### How to install
            1. Download `GameInstaller.zip`.
            2. Extract the zip — you will get a `GameInstaller` folder.
            3. Run `GameInstaller\GameInstaller.exe` inside that folder.
            4. On launch, the app will try to download the latest `games.json`.
            5. If the download fails, the app will use its local fallback behavior.

            ### CrossOver / Wine users
            Before running, install **Visual C++ Redistributable 2019** inside your bottle
            (Bottle → Install Software → search "Visual C++ 2019" or use `vcrun2019`).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}