name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          $date    = Get-Date -Format "yyyyMMdd"
          $run     = "${{ github.run_number }}"
          $tag     = "v$version-$date-$run"
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows executable
        run: >
          pyinstaller
          --onefile
          --windowed
          --uac-admin
          --name "GameInstaller"
          main.py

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Game Installer ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: dist/GameInstaller.exe
          body: |
            **Version:** ${{ steps.tag.outputs.version }}
            **Commit:** `${{ github.sha }}`
            **Trigger:** ${{ github.event_name }}

            ### How to install
            1. Download `GameInstaller.exe`.
            2. Run it.
            3. On launch, the app will try to download the latest `games.json`.
            4. If the download fails, the app will use its local fallback behavior.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}