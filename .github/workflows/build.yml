name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          $date    = Get-Date -Format "yyyyMMdd"
          $run     = "${{ github.run_number }}"
          $tag     = "v$version-$date-$run"
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows executable
        run: >
          pyinstaller
          --onedir
          --windowed
          --uac-admin
          --collect-all PyQt6
          --hidden-import PyQt6.sip
          --contents-directory .
          --name "GameInstaller"
          main.py

      - name: Flatten DLLs for Wine/CrossOver compatibility
        shell: pwsh
        run: |
          pyinstaller --version
          $dest = "dist\GameInstaller"

          Write-Host "=== Build structure (top level) ==="
          Get-ChildItem $dest | Select-Object Name, Attributes

          # ------------------------------------------------------------------
          # Phase 1 - gather EVERY DLL into the exe directory.
          # The exe resolves its OWN startup dependencies (python311.dll,
          # vcruntime140.dll) from its own folder. Wine honours "search the
          # directory of the module being loaded", which is why python311.dll
          # started working once it was placed next to the exe.
          # ------------------------------------------------------------------
          Get-ChildItem $dest -Directory | ForEach-Object {
            Get-ChildItem $_.FullName -Recurse -Filter *.dll | ForEach-Object {
              Copy-Item $_.FullName -Destination $dest -Force
            }
          }
          $rootDlls = (Get-ChildItem $dest -Filter *.dll).Count
          Write-Host "Phase 1: $rootDlls DLLs now in exe directory"

          # ------------------------------------------------------------------
          # Phase 2 - make the PyQt6 folder SELF-CONTAINED.
          # Qt6Core.dll is NOT loaded by the exe; PyQt6\QtCore.pyd pulls it in
          # at "import QtCore" time. Wine resolves a module's dependencies from
          # the folder THAT MODULE LIVES IN, and does NOT reliably honour the
          # AddDllDirectory() path PyInstaller registers for PyQt6\Qt6\bin.
          # So every DLL Qt needs - Qt6*.dll AND their CRT deps including
          # vcruntime140_1.dll - must sit directly next to QtCore.pyd. We mirror
          # the full DLL set (gathered in Phase 1) into that folder.
          # ------------------------------------------------------------------
          $qtPyd = Get-ChildItem $dest -Recurse -Filter QtCore.pyd | Select-Object -First 1
          if (-not $qtPyd) { Write-Error "QtCore.pyd not found in build output"; exit 1 }
          $pyqt6 = $qtPyd.DirectoryName
          Write-Host "QtCore.pyd located in: $pyqt6"
          Get-ChildItem $dest -Filter *.dll | ForEach-Object {
            Copy-Item $_.FullName -Destination $pyqt6 -Force
          }
          $pyqtDlls = (Get-ChildItem $pyqt6 -Filter *.dll).Count
          Write-Host "Phase 2: $pyqtDlls DLLs now next to QtCore.pyd"

          # ------------------------------------------------------------------
          # Verify the critical file landed where Wine will actually look.
          # Fails the build loudly if it did not, instead of shipping a broken zip.
          # ------------------------------------------------------------------
          if (Test-Path (Join-Path $pyqt6 "Qt6Core.dll")) {
            Write-Host "OK: Qt6Core.dll is next to QtCore.pyd"
          } else {
            Write-Error "FAIL: Qt6Core.dll is NOT next to QtCore.pyd"
            exit 1
          }

      - name: Zip dist folder
        shell: pwsh
        run: Compress-Archive -Path dist\GameInstaller -DestinationPath dist\GameInstaller.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Game Installer ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: dist/GameInstaller.zip
          body: |
            **Version:** ${{ steps.tag.outputs.version }}
            **Commit:** `${{ github.sha }}`
            **Trigger:** ${{ github.event_name }}

            ### How to install
            1. Download `GameInstaller.zip`.
            2. Extract the zip — you will get a `GameInstaller` folder.
            3. Run `GameInstaller\GameInstaller.exe` inside that folder.
            4. On launch, the app will try to download the latest `games.json`.
            5. If the download fails, the app will use its local fallback behavior.

            ### CrossOver / Wine users
            Before running, install **Visual C++ Redistributable 2019** inside your bottle
            (Bottle → Install Software → search "Visual C++ 2019" or use `vcrun2019`).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}