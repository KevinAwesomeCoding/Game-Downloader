name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          $date    = Get-Date -Format "yyyyMMdd"
          $run     = "${{ github.run_number }}"
          $tag     = "v$version-$date-$run"
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows executable
        run: >
          pyinstaller
          --onedir
          --windowed
          --uac-admin
          --collect-all PyQt6
          --hidden-import PyQt6.sip
          --contents-directory .
          --name "GameInstaller"
          main.py

      - name: Flatten DLLs for Wine/CrossOver compatibility
        shell: pwsh
        run: |
          pyinstaller --version
          # --contents-directory . (PyInstaller 6+) should already be flat.
          # If _internal still exists (version/cache fallback), copy all DLLs
          # from it up next to the exe so Wine's DLL loader finds them.
          # _internal is kept intact — Python's import system still uses it.
          if (Test-Path "dist\GameInstaller\_internal") {
            Write-Host "_internal found — copying root-level DLLs to exe directory"
            Get-ChildItem "dist\GameInstaller\_internal" -Filter "*.dll" |
              Copy-Item -Destination "dist\GameInstaller\" -Force
            Write-Host "DLLs now present in exe directory:"
            Get-ChildItem "dist\GameInstaller" -Filter "*.dll" | Select-Object -ExpandProperty Name
          } else {
            Write-Host "Flat layout confirmed — no _internal folder present"
          }

      - name: Zip dist folder
        shell: pwsh
        run: Compress-Archive -Path dist\GameInstaller -DestinationPath dist\GameInstaller.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Game Installer ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: dist/GameInstaller.zip
          body: |
            **Version:** ${{ steps.tag.outputs.version }}
            **Commit:** `${{ github.sha }}`
            **Trigger:** ${{ github.event_name }}

            ### How to install
            1. Download `GameInstaller.zip`.
            2. Extract the zip — you will get a `GameInstaller` folder.
            3. Run `GameInstaller\GameInstaller.exe` inside that folder.
            4. On launch, the app will try to download the latest `games.json`.
            5. If the download fails, the app will use its local fallback behavior.

            ### CrossOver / Wine users
            Before running, install **Visual C++ Redistributable 2019** inside your bottle
            (Bottle → Install Software → search "Visual C++ 2019" or use `vcrun2019`).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}