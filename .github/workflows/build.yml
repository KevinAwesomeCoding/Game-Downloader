name: Build and Release

permissions:
  contents: write

# Triggers on pushes to main, but ONLY when application code changes.
# Pushing a games.json-only change will not trigger this workflow.
on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          $date    = Get-Date -Format "yyyyMMdd"
          $run     = "${{ github.run_number }}"
          $tag     = "v$version-$date-$run"
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows executable
        run: >
          pyinstaller
          --onefile
          --windowed
          --name "GameInstaller"
          main.py

      - name: Copy games.json next to executable
        shell: pwsh
        run: Copy-Item games.json dist\games.json

      - name: Package release zip
        shell: pwsh
        run: |
          $zip = "GameInstaller-${{ steps.tag.outputs.tag }}.zip"
          Compress-Archive -Path dist\GameInstaller.exe, dist\games.json `
            -DestinationPath $zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Game Installer ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: GameInstaller-${{ steps.tag.outputs.tag }}.zip
          body: |
            **Version:** ${{ steps.tag.outputs.version }}
            **Commit:** `${{ github.sha }}`
            **Trigger:** ${{ github.event_name }}

            ### How to install
            1. Download and extract the zip.
            2. Run `GameInstaller.exe`.
            3. Keep `games.json` in the same folder as the exe — the app reads it from there.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}