name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          $date    = Get-Date -Format "yyyyMMdd"
          $run     = "${{ github.run_number }}"
          $tag     = "v$version-$date-$run"
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows executable
        run: >
          pyinstaller
          --onedir
          --windowed
          --uac-admin
          --collect-all PyQt6
          --hidden-import PyQt6.sip
          --contents-directory .
          --name "GameInstaller"
          main.py

      - name: Flatten DLLs for Wine/CrossOver compatibility
        shell: pwsh
        run: |
          pyinstaller --version
          $dest = "dist\GameInstaller"

          Write-Host "=== Build structure before flatten ==="
          Get-ChildItem $dest | Select-Object Name, Attributes

          # --- Step 1: copy ALL DLLs from every subdirectory up to the exe root ---
          # Wine's PE loader searches the exe directory when launching the process.
          # This covers python311.dll, vcruntime140.dll, api-ms-win-*.dll, etc.
          $copied = 0
          Get-ChildItem $dest -Directory | ForEach-Object {
            Write-Host "Scanning: $($_.Name)"
            Get-ChildItem $_.FullName -Filter "*.dll" -Recurse | ForEach-Object {
              Copy-Item $_.FullName -Destination "$dest\" -Force
              Write-Host "  -> $($_.Name)"
              $copied++
            }
          }
          Write-Host "=== Step 1: $copied DLLs copied to exe root ==="

          # --- Step 2: copy Qt6*.dll next to QtCore.pyd ---
          # python311.dll is found by the PE loader (exe dir). But Qt6Core.dll is
          # loaded later by QtCore.pyd via LoadLibrary(). Wine's LoadLibrary searches
          # the *calling module's directory* first — that is the PyQt6/ folder where
          # QtCore.pyd lives, NOT the exe directory. Qt DLLs must be there too.
          $qtPyd = Get-ChildItem $dest -Filter "QtCore.pyd" -Recurse |
                   Select-Object -First 1
          if ($qtPyd) {
            $pyqt6Dir = $qtPyd.DirectoryName
            Write-Host "QtCore.pyd found at: $pyqt6Dir"
            # Find Qt6/bin/ wherever it sits in the tree
            $qt6bin = Get-ChildItem $dest -Directory -Recurse |
                      Where-Object { $_.Name -eq "bin" -and $_.Parent.Name -eq "Qt6" } |
                      Select-Object -First 1
            if ($qt6bin) {
              Write-Host "Qt6/bin found at: $($qt6bin.FullName)"
              Get-ChildItem $qt6bin.FullName -Filter "Qt6*.dll" | ForEach-Object {
                Copy-Item $_.FullName -Destination $pyqt6Dir -Force
                Write-Host "  Qt DLL -> PyQt6/: $($_.Name)"
              }
            } else {
              Write-Host "Qt6/bin not found — copying any Qt6*.dll found in tree"
              Get-ChildItem $dest -Filter "Qt6*.dll" -Recurse | ForEach-Object {
                Copy-Item $_.FullName -Destination $pyqt6Dir -Force
                Write-Host "  Qt DLL -> PyQt6/: $($_.Name)"
              }
            }
            Write-Host "=== Step 2: Qt DLLs now in PyQt6/ ==="
            Get-ChildItem $pyqt6Dir -Filter "Qt6*.dll" | Select-Object -ExpandProperty Name
          } else {
            Write-Host "WARNING: QtCore.pyd not found — Qt DLL placement skipped"
          }

      - name: Zip dist folder
        shell: pwsh
        run: Compress-Archive -Path dist\GameInstaller -DestinationPath dist\GameInstaller.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Game Installer ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: dist/GameInstaller.zip
          body: |
            **Version:** ${{ steps.tag.outputs.version }}
            **Commit:** `${{ github.sha }}`
            **Trigger:** ${{ github.event_name }}

            ### How to install
            1. Download `GameInstaller.zip`.
            2. Extract the zip — you will get a `GameInstaller` folder.
            3. Run `GameInstaller\GameInstaller.exe` inside that folder.
            4. On launch, the app will try to download the latest `games.json`.
            5. If the download fails, the app will use its local fallback behavior.

            ### CrossOver / Wine users
            Before running, install **Visual C++ Redistributable 2019** inside your bottle
            (Bottle → Install Software → search "Visual C++ 2019" or use `vcrun2019`).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}