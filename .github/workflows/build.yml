name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          $date    = Get-Date -Format "yyyyMMdd"
          $run     = "${{ github.run_number }}"
          $tag     = "v$version-$date-$run"
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build onedir (CrossOver / Wine)
        run: >
          pyinstaller
          --onedir
          --windowed
          --collect-all PyQt6
          --hidden-import PyQt6.sip
          --contents-directory .
          --name "GameInstaller"
          main.py

      # NOTE: No DLL-flattening step on purpose. PyInstaller's PyQt6 layout and
      # its generated qt.conf must stay intact — especially
      # PyQt6/Qt6/plugins/platforms/qwindows.dll. Flattening breaks Qt's plugin
      # discovery and never fixed the real Wine failure, which is the bottle's
      # Universal CRT (ucrtbase) being too old for the bundled MSVC 14.44
      # runtime that Qt 6.x links against. Fix that in the bottle (recent
      # CrossOver / matching VC++ redist), not by moving DLLs around.

      - name: Zip onedir build
        shell: pwsh
        run: Compress-Archive -Path dist\GameInstaller -DestinationPath dist\GameInstaller.zip

      - name: Build onefile (Windows)
        run: >
          pyinstaller
          --onefile
          --windowed
          --collect-all PyQt6
          --hidden-import PyQt6.sip
          --name "GameInstaller"
          main.py

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Game Installer ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            dist/GameInstaller.zip
            dist/GameInstaller.exe
          body: |
            **Version:** ${{ steps.tag.outputs.version }}
            **Commit:** `${{ github.sha }}`
            **Trigger:** ${{ github.event_name }}

            ### Windows users
            Download **`GameInstaller.exe`** — single file, run directly.

            ### CrossOver / Wine users (Mac)
            Download **`GameInstaller.zip`**, extract it, then run `GameInstaller\GameInstaller.exe` from inside the extracted folder.
            Requires CrossOver 24+ (Wine 9+) for the bundled Qt runtime to load correctly.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}