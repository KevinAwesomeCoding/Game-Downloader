name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          $date    = Get-Date -Format "yyyyMMdd"
          $run     = "${{ github.run_number }}"
          $tag     = "v$version-$date-$run"
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows executable
        run: >
          pyinstaller
          --onedir
          --windowed
          --uac-admin
          --collect-all PyQt6
          --hidden-import PyQt6.sip
          --contents-directory .
          --name "GameInstaller"
          main.py

      - name: Diagnose build structure
        shell: pwsh
        run: |
          $dest = "dist\GameInstaller"
          $root = (Resolve-Path $dest).Path
          Get-ChildItem $dest -Recurse |
            Select-Object FullName, Length |
            ForEach-Object {
              $rel = $_.FullName.Replace($root + "\", "")
              "$rel  ($($_.Length) bytes)"
            } |
            Out-File -FilePath dist\build-tree.txt -Encoding utf8
          Write-Host "Tree written to dist\build-tree.txt"

      - name: Upload build tree artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-tree
          path: dist\build-tree.txt

      - name: Zip dist folder
        shell: pwsh
        run: Compress-Archive -Path dist\GameInstaller -DestinationPath dist\GameInstaller.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Game Installer ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: dist/GameInstaller.zip
          body: |
            **Version:** ${{ steps.tag.outputs.version }}
            **Commit:** `${{ github.sha }}`
            **Trigger:** ${{ github.event_name }}

            ### How to install
            1. Download `GameInstaller.zip`.
            2. Extract the zip — you will get a `GameInstaller` folder.
            3. Run `GameInstaller\GameInstaller.exe` inside that folder.
            4. On launch, the app will try to download the latest `games.json`.
            5. If the download fails, the app will use its local fallback behavior.

            ### CrossOver / Wine users
            Before running, install **Visual C++ Redistributable 2019** inside your bottle
            (Bottle → Install Software → search "Visual C++ 2019" or use `vcrun2019`).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}